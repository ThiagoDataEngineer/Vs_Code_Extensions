name: RodeoDay iOS CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'IOS/RodeoDay/**'
      - '.github/workflows/ios-rodeoday-ci.yml'
  pull_request:
    paths:
      - 'IOS/RodeoDay/**'
      - '.github/workflows/ios-rodeoday-ci.yml'
  workflow_dispatch:
    inputs:
      project_path:
        description: Path to .xcodeproj (optional)
        required: false
        type: string
      scheme:
        description: Xcode scheme (optional)
        required: false
        type: string

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: IOS/RodeoDay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve project and scheme
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_INPUT="${{ github.event.inputs.project_path }}"
          SCHEME_INPUT="${{ github.event.inputs.scheme }}"

          if [ -n "${PROJECT_INPUT}" ]; then
            PROJECT_PATH="${PROJECT_INPUT}"
          else
            PROJECT_PATH=$(find . -maxdepth 4 -name "*.xcodeproj" | head -n 1 || true)
          fi

          if [ -z "${PROJECT_PATH}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .xcodeproj found in IOS/RodeoDay. CI executed and skipped build/test."
            exit 0
          fi

          if [ -n "${SCHEME_INPUT}" ]; then
            SCHEME="${SCHEME_INPUT}"
          else
            SCHEME=$(xcodebuild -list -project "${PROJECT_PATH}" | awk '
              BEGIN { in_schemes=0 }
              /^Schemes:/ { in_schemes=1; next }
              in_schemes && NF { gsub(/^ +| +$/, "", $0); print; exit }
            ')
          fi

          if [ -z "${SCHEME}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No shared scheme found for ${PROJECT_PATH}. CI executed and skipped build/test."
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "project_path=${PROJECT_PATH}" >> "$GITHUB_OUTPUT"
          echo "scheme=${SCHEME}" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.resolve.outputs.found == 'true'
        run: |
          xcodebuild \
            -project "${{ steps.resolve.outputs.project_path }}" \
            -scheme "${{ steps.resolve.outputs.scheme }}" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            clean build

      - name: Test
        if: steps.resolve.outputs.found == 'true'
        run: |
          xcodebuild \
            -project "${{ steps.resolve.outputs.project_path }}" \
            -scheme "${{ steps.resolve.outputs.scheme }}" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            test
